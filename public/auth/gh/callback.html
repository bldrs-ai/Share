<!DOCTYPE html>
<!--
  GitHub OAuth popup callback. The popup lands here with ?code=…&state=…
  (or ?error=…), forwards those values to the opener via postMessage, and
  closes itself. The opener (GitHubProvider.connect) verifies state, posts
  the code to /.netlify/functions/gh-oauth-exchange, and persists the token.

  This page must be same-origin with the opener so postMessage can target
  window.location.origin. It deliberately ships no app code — it should
  load instantly even if the main bundle is broken.
-->
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Connecting to GitHub…</title>
  <style>
    body {
      font-family: system-ui, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
      color: #444;
    }
  </style>
</head>
<body>
  <p>Finishing GitHub sign-in… you can close this window.</p>
  <script>
    (function () {
      var params = new URLSearchParams(window.location.search)
      var payload = {
        type: 'bldrs:gh-oauth-callback',
        code: params.get('code'),
        state: params.get('state'),
        error: params.get('error'),
        error_description: params.get('error_description'),
      }

      // BroadcastChannel is the primary delivery path. github.com's strict
      // Cross-Origin-Opener-Policy severs window.opener when the popup
      // first navigates there; even though we return to a same-origin
      // page, the browsing-context-group switch is permanent and
      // window.opener stays null. BroadcastChannel works same-origin
      // without any opener relationship.
      try {
        var ch = new BroadcastChannel('bldrs:gh-oauth')
        ch.postMessage(payload)
        ch.close()
      } catch (e) {
        // BroadcastChannel unsupported — fall through to postMessage.
      }

      // Fallback: postMessage via window.opener. Almost always a no-op in
      // practice (see COOP note above) but kept for older browsers and
      // for environments where the OAuth provider doesn't set strict COOP.
      try {
        if (window.opener && !window.opener.closed) {
          window.opener.postMessage(payload, window.location.origin)
        }
      } catch (e) {
        // No-op.
      }
      window.close()
    })()
  </script>
</body>
</html>
