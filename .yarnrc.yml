# Yarn Berry config. See design/new/web-build-environment.md for why this repo is
# on Berry (yarn classic cannot install behind the Claude-Code-on-web egress).
yarnPath: .yarn/releases/yarn-4.9.2.cjs
nodeLinker: node-modules

# yarn classic has no per-request retry; Berry does. The sandbox egress resets
# sustained installer sockets, so retry hard and keep concurrency low.
httpRetry: 12
networkConcurrency: 2
enableGlobalCache: true
