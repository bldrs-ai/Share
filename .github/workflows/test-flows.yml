name: test-flows

on:
  push:
    branches: [ main ]
    paths-ignore:
      - '**/*.md'
      - 'design/**'
      - 'notes/**'
  pull_request:
    branches: [ main ]
    paths-ignore:
      - '**/*.md'
      - 'design/**'
      - 'notes/**'
  workflow_dispatch:

jobs:
  playwright-run:
    runs-on: ubuntu-22.04-8vcpu-32gb-300gbssd
    # Image must match @playwright/test in package.json (Playwright caches
    # by version + matches browser APIs). The -noble (Ubuntu 24.04) variant
    # is chosen so screenshot baselines regenerated in the dev/sandbox env
    # (also noble + chromium 1194) match CI's renders pixel-for-pixel.
    container: mcr.microsoft.com/playwright:v1.56.1-noble
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'yarn'
          cache-dependency-path: 'yarn.lock'

      - name: Mark workspace as safe for git
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"
            
      # Use exact lock file to ensure reproducible install and cached node_modules
      # since we're hashing on yarn.lock anyways
      - run: yarn install --frozen-lockfile --prefer-offline

      # Useful diagnostic
      - name: Playwright Info
        run: npx playwright --version

      - name: Run Playwright tests
        run: yarn test-flows --reporter=github,list,html --workers=6

      # Always upload the HTML report (handy to debug failures)
      - name: Upload Playwright HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report
          retention-days: 7
          if-no-files-found: warn

      # Optionally upload traces from failed tests
      - name: Upload Playwright traces
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-traces
          path: test-results
          retention-days: 7
          if-no-files-found: warn
        # Ensure you have trace: 'on-first-retry' (or similar) in playwright.config.ts

    env:
      # Keep your app env similar to Cypress job (adjust as needed for tests/MSW)
      GITHUB_BASE_URL: https://git.bldrs.dev.pw/p/gh
      GITHUB_BASE_URL_UNAUTHENTICATED: https://api.github.com.pw
      MSW_IS_ENABLED: true

  # web-ifc ENGINE smoke: builds with USE_WEBIFC_SHIM=false (real web-ifc,
  # not the Conway shim) and serves it cross-origin isolated, then loads
  # index.ifc in the browser. Separate job from playwright-run because it
  # needs a different build + an isolated static server. web-ifc is pinned
  # to its single-threaded engine (0.0.35's MT build is unshippable as
  # packaged — see webIfcSingleThreadPlugin in tools/esbuild/plugins.js);
  # this job is advisory and expected GREEN. It forwards the browser
  # console so any isolated-runtime failure is legible without a local
  # browser (see design/new/viewer-replacement.md §5f).
  playwright-webifc-run:
    runs-on: ubuntu-22.04-8vcpu-32gb-300gbssd
    container: mcr.microsoft.com/playwright:v1.56.1-noble
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'yarn'
          cache-dependency-path: 'yarn.lock'

      - name: Mark workspace as safe for git
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - run: yarn install --frozen-lockfile --prefer-offline

      - name: Playwright Info
        run: npx playwright --version

      - name: Run web-ifc engine Playwright smoke
        run: yarn test-flows-webifc --reporter=github,list,html --workers=1

      - name: Upload web-ifc Playwright HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-webifc
          path: playwright-report-webifc
          retention-days: 7
          if-no-files-found: warn

      - name: Upload web-ifc Playwright traces
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-traces-webifc
          path: test-results
          retention-days: 7
          if-no-files-found: warn

    env:
      GITHUB_BASE_URL: https://git.bldrs.dev.pw/p/gh
      GITHUB_BASE_URL_UNAUTHENTICATED: https://api.github.com.pw
      MSW_IS_ENABLED: true
