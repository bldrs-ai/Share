name: build

on:
  push:
    branches: [ main ]
    paths-ignore:
      - '**/*.md'
      - 'design/**'
      - 'notes/**'
  pull_request:
    branches: [ main ]
    paths-ignore:
      - '**/*.md'
      - 'design/**'
      - 'notes/**'
  workflow_dispatch:

jobs:
  build:
    timeout-minutes: 10
    concurrency:
      group: build-group
      cancel-in-progress: true
    env:
      SHARE_CONFIG: dev
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: yarn install
      - run: yarn build-prod
      - run: yarn lint
      - run: yarn test-ci
      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage/
          retention-days: 14
