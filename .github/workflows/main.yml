name: build

on:
  push:
    branches: [ main ]
    paths-ignore:
      - '**/*.md'
      - 'design/**'
      - 'notes/**'
  pull_request:
    branches: [ main ]
    paths-ignore:
      - '**/*.md'
      - 'design/**'
      - 'notes/**'
  workflow_dispatch:

jobs:
  build:
    timeout-minutes: 10
    # Per-ref group so a push to one branch only cancels in-progress builds
    # for that same branch. The previous static `build-group` cancelled
    # across every branch in the repo, so any push anywhere aborted PR
    # builds that happened to be running.
    concurrency:
      group: build-${{ github.workflow }}-${{ github.ref }}
      cancel-in-progress: true
    env:
      SHARE_CONFIG: dev
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install dependencies
        run: |
          # Activate yarn Berry from package.json#packageManager (+ vendored
          # .yarn/releases binary). --immutable is Berry's --frozen-lockfile.
          corepack enable
          yarn install --immutable
      - run: yarn build-prod
      - run: yarn lint
      - run: yarn test-ci
      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage/
          retention-days: 14
