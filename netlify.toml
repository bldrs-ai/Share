# Skip the deploy preview when the only changes are documentation. The script
# exits 0 to skip and 1 to build; logic and edge cases are documented inline.
#
# `yarn build` chains through build-share → build-marketing
# (tools/marketing/build.js), which builds the Next.js marketing site and
# overlays marketing/out/ onto docs/. Same script runs for `yarn serve`
# locally, so dev and prod produce identical merged trees:
#   /                  → SPA (docs/index.html — react-router → IFC homepage)
#   /share/*           → SPA (public/_redirects /share/* /index.html 200)
#   /about/, /pricing/,
#   /services/, /blog/,
#   /privacy/, /tos/   → marketing static HTML (file-match wins before _redirects)
#   /sitemap.xml,
#   /robots.txt,
#   /feed.xml          → marketing
# _redirects carries an explicit SPA allowlist so unknown paths 404 instead
# of returning the SPA shell with HTTP 200 (soft-404 SEO trap). Marketing's
# static export emits no out/index.html (root page.tsx removed), so the
# overlay does not clobber the SPA's docs/index.html at /.
[build]
  command = "yarn build"
  publish = "docs"
  ignore = "bash tools/netlify/ignore-build.sh"

# Local development. `npx netlify dev` launches `yarn serve-prod` (the
# esbuild static-file server on :8080) and serves netlify/functions/* on
# the same origin at :8888 so /.netlify/functions/* reaches them. Without
# this block, functions only run on deploy previews — the esbuild server
# 404s on the function path. Used by the GitHub OAuth broker (PR1 of
# identity-decoupling) and any future function-backed feature.
[dev]
  command = "yarn serve-prod"
  targetPort = 8080
  port = 8888
  publish = "docs"
  functions = "netlify/functions"
  framework = "#custom"

# Cross-origin isolation (issue #1610): COOP same-origin + COEP
# credentialless makes `crossOriginIsolated` true, which unlocks
# SharedArrayBuffer and Conway's multithreaded wasm (~2.8x geometry
# extraction). conway-geom's loader auto-selects the MT build at
# runtime when isolation is present, and both wasm variants already
# ship in /static/js — no build changes needed.
#
# KNOWN BREAKAGE under these headers, to be fixed in the follow-up
# phases of #1610 before this merges:
#  - GIS OAuth popup: COOP same-origin severs window.opener, so
#    Google's postMessage delivery fails. Fix: our own popup running
#    the redirect flow into a same-origin /auth callback that relays
#    the code over BroadcastChannel (channel scope is the origin, not
#    the browsing-context group, so COOP doesn't sever it).
#  - Google Drive Picker iframe: docs.google.com sends CORP:
#    same-site; credentialless COEP loads non-consenting subresources
#    cookie-less, and a cookie-less Picker session is broken UX. Fix:
#    host the Picker in our own popup window (popups are not embedded
#    content, so COEP does not apply to them), relaying the selection
#    over the same channel.
# credentialless (vs require-corp) keeps stray cross-origin images/
# fonts loading (cookie-less) instead of hard-failing them.
[[headers]]
  for = "/*"
  [headers.values]
    Cross-Origin-Opener-Policy = "same-origin"
    Cross-Origin-Embedder-Policy = "credentialless"

# Override headers for the /subscribe route so that no strict isolation is enforced.
[[headers]]
  for = "/subscribe/*"
  [headers.values]
    Cross-Origin-Opener-Policy = "unsafe-none"
    Cross-Origin-Embedder-Policy = "unsafe-none"

# Redirect /subscribe to /subscribe/ to enforce a trailing slash.
[[redirects]]
  from = "/subscribe"
  to = "/subscribe/"
  status = 301
  force = true